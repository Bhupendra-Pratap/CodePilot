<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodePilot Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <main class="layout">
    <header class="header">
      <div>
        <p class="eyebrow">Developer Workspace</p>
        <h1>CodePilot Assistant</h1>
        <p class="subhead">A coding-focused AI helper for debugging, architecture ideas, and cleaner code.</p>
      </div>
      <div class="status-pill">Online</div>
    </header>

    <section id="chat" class="chat" aria-live="polite"></section>

    <form id="chat-form" class="composer">
      <label class="sr-only" for="message">Message</label>
      <textarea id="message" rows="2" placeholder="Ask about code, errors, architecture, or API design..." required></textarea>
      <div class="composer-actions">
        <span class="hint">Enter to send, Shift+Enter for new line</span>
        <button type="submit">Run Prompt</button>
      </div>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
